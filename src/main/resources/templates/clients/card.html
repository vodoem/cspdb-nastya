<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Клиент')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2>Карточка клиента</h2><div class="card p-3 mb-3"><div><b>ФИО:</b> <span th:text="${client.fullName}"></span></div><div><b>Телефон:</b> <span th:text="${client.phone}"></span></div><div><b>Email:</b> <span th:text="${client.email}"></span></div></div><h4>Обращения</h4><ul><li th:each="r : ${requests}"><a th:href="@{|/requests/${r.id}|}" th:text="|Обращение #${r.id}|"></a></li></ul><h4>Бронирования</h4><ul><li th:each="b : ${bookings}"><a th:href="@{|/bookings/${b.id}|}" th:text="|Бронирование #${b.id}|"></a></li></ul></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
