<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Тур')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2 th:text="${tour.tourName}"></h2><div class="card p-3"><p><b>Код:</b> <span th:text="${tour.tourCode}"></span></p><p><b>Направление:</b> <span th:text="${tour.direction.directionName}"></span></p><p><b>Партнер:</b> <span th:text="${tour.partner.partnerName}"></span></p><p><b>Даты:</b> <span th:text="|${tour.startDate} - ${tour.endDate}|"></span></p><p><b>Стоимость:</b> <span th:text="${tour.price}"></span></p><p><b>Вместимость:</b> <span th:text="${tour.capacity}"></span></p><p><b>Описание:</b> <span th:text="${tour.description}"></span></p></div></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
