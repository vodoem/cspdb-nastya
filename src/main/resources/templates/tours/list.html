<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Туры')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2>Туры</h2><table class="table table-striped"><tr><th>Код</th><th>Название</th><th>Направление</th><th>Стоимость</th><th>Начало</th><th>Окончание</th><th></th></tr><tr th:each="t : ${tours}"><td th:text="${t.tourCode}"></td><td th:text="${t.tourName}"></td><td th:text="${t.direction.directionName}"></td><td th:text="${t.price}"></td><td th:text="${t.startDate}"></td><td th:text="${t.endDate}"></td><td><a class="btn btn-sm btn-primary" th:href="@{|/tours/${t.tourCode}|}">Открыть</a></td></tr></table></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
