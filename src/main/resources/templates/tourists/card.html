<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Турист')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2>Карточка туриста</h2><div class="card p-3"><p><b>ФИО:</b> <span th:text="${tourist.fullName}"></span></p><p><b>Дата рождения:</b> <span th:text="${tourist.birthDate}"></span></p><p><b>Паспорт:</b> <span th:text="|${tourist.passportSeries} ${tourist.passportNumber}|"></span></p></div><h4 class="mt-3">Бронирования</h4><ul><li th:each="bt : ${bookings}"><a th:href="@{|/bookings/${bt.booking.id}|}" th:text="|Бронирование #${bt.booking.id}|"></a></li></ul></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
