<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Бронирования')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2>Бронирования</h2><table class="table table-striped"><tr><th>ID</th><th>Тур</th><th>Клиент</th><th>Менеджер</th><th>Дата</th><th>Статус</th><th>Итоговая стоимость</th><th></th></tr><tr th:each="b : ${bookings}"><td th:text="${b.id}"></td><td th:text="${b.tour.tourName}"></td><td th:text="${b.request.client.fullName}"></td><td th:text="${b.bookingManager.fullName}"></td><td th:text="${b.bookingDate}"></td><td th:text="${b.status.statusName}"></td><td th:text="${b.totalPrice}"></td><td><a class="btn btn-sm btn-primary" th:href="@{|/bookings/${b.id}|}">Открыть</a></td></tr></table></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
