<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Добавление туриста')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2>Добавить туриста в бронирование</h2><form th:action="@{/booking-tourists}" th:object="${form}" method="post"><div class="mb-3"><label>Бронирование</label><select class="form-select" th:field="*{bookingId}"><option th:each="b:${bookings}" th:value="${b.id}" th:text="|#${b.id} ${b.tour.tourName}|"></option></select></div><div class="mb-3"><label>Турист</label><select class="form-select" th:field="*{touristId}"><option th:each="t:${tourists}" th:value="${t.id}" th:text="${t.fullName}"></option></select></div><button class="btn btn-primary" type="submit">Добавить</button></form></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
