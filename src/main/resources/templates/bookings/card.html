<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Бронирование')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2 th:text="|Бронирование #${booking.id}|"></h2><div class="card p-3 mb-3"><p><b>Тур:</b> <span th:text="${booking.tour.tourName}"></span></p><p><b>Клиент:</b> <span th:text="${booking.request.client.fullName}"></span></p><p><b>Менеджер:</b> <span th:text="${booking.bookingManager.fullName}"></span></p><p><b>Дата:</b> <span th:text="${booking.bookingDate}"></span></p><p><b>Статус:</b> <span th:text="${booking.status.statusName}"></span></p><p><b>Стоимость:</b> <span th:text="${booking.totalPrice}"></span></p></div><h4>Туристы</h4><ul><li th:each="bt : ${tourists}" th:text="${bt.tourist.fullName}"></li></ul><a class="btn btn-success" th:href="@{/booking-tourists/new}">Добавить туриста</a></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
