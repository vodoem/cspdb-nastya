<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Обращение')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2 th:text="|Обращение #${request.id}|"></h2><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div><div class="card p-3 mb-4"><p><b>Клиент:</b> <span th:text="${request.client.fullName}"></span></p><p><b>Менеджер:</b> <span th:text="${request.manager.fullName}"></span></p><p><b>Направление:</b> <span th:text="${request.direction.directionName}"></span></p><p><b>Дата:</b> <span th:text="${request.requestDate}"></span></p><p><b>Статус:</b> <span th:text="${request.status.statusName}"></span></p><p><b>Бюджет:</b> <span th:text="${request.plannedBudget}"></span></p><p><b>Количество туристов:</b> <span th:text="${request.touristsCount}"></span></p><p><b>Комментарий:</b> <span th:text="${request.managerComment}"></span></p></div><h4>Создать бронирование</h4><form th:action="@{|/requests/${request.id}/booking|}" th:object="${bookingForm}" method="post"><div class="mb-2"><label>Менеджер</label><select class="form-select" th:field="*{managerId}"><option th:each="m:${managers}" th:value="${m.id}" th:text="${m.fullName}"></option></select></div><div class="mb-2"><label>Тур</label><select class="form-select" th:field="*{tourCode}"><option th:each="t:${tours}" th:value="${t.tourCode}" th:text="${t.tourName}"></option></select></div><div class="mb-2"><label>Статус</label><select class="form-select" th:field="*{statusName}"><option th:each="s:${bookingStatuses}" th:value="${s.statusName}" th:text="${s.statusName}"></option></select></div><div class="mb-2"><label>Комментарий</label><textarea class="form-control" th:field="*{managerComment}"></textarea></div><button class="btn btn-success">Создать бронирование</button></form></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
