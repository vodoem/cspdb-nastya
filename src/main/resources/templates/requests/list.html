<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Обращения')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><div class="d-flex justify-content-between"><h2>Обращения</h2><a class="btn btn-success" th:href="@{/requests/new}">Создать обращение</a></div><table class="table table-striped"><tr><th>ID</th><th>Клиент</th><th>Менеджер</th><th>Направление</th><th>Дата</th><th>Статус</th><th></th></tr><tr th:each="r : ${requests}"><td th:text="${r.id}"></td><td th:text="${r.client.fullName}"></td><td th:text="${r.manager.fullName}"></td><td th:text="${r.direction.directionName}"></td><td th:text="${r.requestDate}"></td><td th:text="${r.status.statusName}"></td><td><a class="btn btn-sm btn-primary" th:href="@{|/requests/${r.id}|}">Открыть</a></td></tr></table></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
