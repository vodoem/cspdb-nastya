<!DOCTYPE html><html lang="ru" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/header :: head('Новое обращение')}"/><body><div th:replace="~{fragments/navbar :: navbar}"></div><div class="container"><h2>Создание обращения</h2><form th:action="@{/requests}" th:object="${form}" method="post"><div class="mb-3"><label>Клиент</label><select class="form-select" th:field="*{clientId}"><option th:each="c:${clients}" th:value="${c.id}" th:text="${c.fullName}"></option></select></div><div class="mb-3"><label>Менеджер</label><select class="form-select" th:field="*{managerId}"><option th:each="m:${managers}" th:value="${m.id}" th:text="${m.fullName}"></option></select></div><div class="mb-3"><label>Направление</label><select class="form-select" th:field="*{directionName}"><option th:each="d:${directions}" th:value="${d.directionName}" th:text="${d.directionName}"></option></select></div><div class="mb-3"><label>Плановый бюджет</label><input class="form-control" th:field="*{plannedBudget}"/></div><div class="mb-3"><label>Количество туристов</label><input class="form-control" th:field="*{touristsCount}"/><div class="text-danger" th:errors="*{touristsCount}"></div></div><div class="mb-3"><label>Комментарий</label><textarea class="form-control" th:field="*{managerComment}"></textarea></div><button class="btn btn-primary" type="submit">Сохранить</button></form></div><div th:replace="~{fragments/footer :: footer}"></div></body></html>
